
services:
  # Development Service: Next.js dev server with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: startpage-dev
    ports:
      - "7774:7774"
    volumes:
      - ./data:/app/data
      - ./app/app:/app/app
      - ./app/lib:/app/lib
      - ./app/public:/app/public
      - ./app/next.config.js:/app/next.config.js
      - ./app/tailwind.config.js:/app/tailwind.config.js
      - ./app/postcss.config.js:/app/postcss.config.js
      - ./app/jsconfig.json:/app/jsconfig.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=7774
      - WATCHPACK_POLLING=true # Essential for hot reloading in Docker on Windows/WSL2
      - DATABASE_DIR=/app/data
    restart: always

  # Production Service: Next.js server with persistent SQLite db
  prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: startpage-prod
    ports:
      - "7774:7774"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=7774
      - NODE_ENV=production
      - DATABASE_DIR=/app/data
    restart: always

